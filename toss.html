<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toss - TaleOn</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Coin Flip Animation */
    @keyframes flip {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(720deg); }
    }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white font-[Inter] text-center">

  <div class="max-w-[500px] mx-auto p-10">
    <!-- Title -->
    <h1 class="font-[Orbitron] text-[2.5rem] text-[#00c3ff] mb-8"
        style="text-shadow: 0 0 10px #00c3ff, 0 0 20px #00c3ff;">
      Who Starts?
    </h1>

    <!-- Coin -->
    <div id="coin" class="w-[120px] h-[120px] mx-auto mb-5 rounded-full"
         style="background: linear-gradient(145deg, #00c3ff, #0077ff);
                box-shadow: 0 0 20px #00c3ff, 0 0 40px #00c3ff;">
    </div>

    <!-- Toss Button -->
    <button onclick="startToss()" 
            class="toss-btn font-[Orbitron] text-base px-5 py-2 mt-5 rounded-md bg-[#00c3ff] text-black cursor-pointer transition duration-300 hover:shadow-[0_0_15px_#00c3ff,0_0_25px_#00c3ff]">
      Flip Coin
    </button>

    <!-- Result Box -->
    <div id="resultBox" class="hidden">
      <p id="resultText" class="text-[1.3rem] mt-5 text-[#ff006f]" 
         style="text-shadow: 0 0 10px #ff006f;"></p>
      <button onclick="goToGame()" 
              class="font-[Orbitron] text-base px-5 py-2 mt-5 rounded-md bg-[#00c3ff] text-black cursor-pointer transition duration-300 hover:shadow-[0_0_15px_#00c3ff,0_0_25px_#00c3ff]">
        Go to Game
      </button>
    </div>
  </div>

  <script>
    function startToss() {
      const coin = document.getElementById("coin");
      const resultBox = document.getElementById("resultBox");
      const resultText = document.getElementById("resultText");

      // Simulate getting player list (later from backend)
      let players = JSON.parse(sessionStorage.getItem("players")) || [
        sessionStorage.getItem("playerName") || "Player",
        "AI_Buddy"
      ];

      // Play flip animation
      coin.style.animation = "flip 1s ease-in-out";
      document.querySelector(".toss-btn").disabled = true;

      setTimeout(() => {
        coin.style.animation = "none";
        const winner = players[Math.floor(Math.random() * players.length)];
        resultText.textContent = `${winner} starts the story!`;
        resultBox.classList.remove("hidden");
      }, 1000);
    }

    function goToGame() {
      window.location.href = "game-room.html";
    }
  </script>
</body>
</html>
