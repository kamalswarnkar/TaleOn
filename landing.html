<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaleOn</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="landing.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Tale<span>On</span></h1>
        <p class="tagline">Keep the tale going… or get roasted together!</p>

        <div class="buttons">
            <button onclick="createRoom()">Create Room</button>
            <button onclick="joinRoom()">Join Room</button>
        </div>

        <div class="how-it-works">
            <h2>How It Works</h2>
            <p>Take turns writing a story with friends and AI. No genre rules — just keep it flowing! 
            At the end, AI decides if you all win… or if it roasts you mercilessly.</p>
        </div>
    </div>

    <script src="landing.js"></script>
</body>
</html>
