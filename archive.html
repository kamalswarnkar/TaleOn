<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Story Archive - TaleOn</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-[Inter] text-center">

  <div class="max-w-[900px] mx-auto p-5">
    <!-- Title -->
    <h1 class="font-[Orbitron] text-[2.5rem] tracking-[2px] text-[#00c3ff]" 
        style="text-shadow:0 0 10px #00c3ff,0 0 20px #00c3ff;">
      Story <span class="text-[#ff006f]" style="text-shadow:0 0 10px #ff006f,0 0 20px #ff006f;">Archive</span>
    </h1>

    <!-- Subtitle -->
    <p class="text-[#ccc] italic mb-5">Relive your wins, your losses... and your roasts.</p>

    <!-- Filters -->
    <div class="mb-5">
      <button onclick="filterStories('all')" 
              class="font-[Orbitron] text-sm px-4 py-2 m-1 rounded-md bg-[#00c3ff] text-black cursor-pointer transition duration-300 hover:shadow-[0_0_15px_#00c3ff,0_0_25px_#00c3ff]">
        All
      </button>
      <button onclick="filterStories('WIN')" 
              class="font-[Orbitron] text-sm px-4 py-2 m-1 rounded-md bg-[#00c3ff] text-black cursor-pointer transition duration-300 hover:shadow-[0_0_15px_#00c3ff,0_0_25px_#00c3ff]">
        Wins
      </button>
      <button onclick="filterStories('LOSE')" 
              class="font-[Orbitron] text-sm px-4 py-2 m-1 rounded-md bg-[#00c3ff] text-black cursor-pointer transition duration-300 hover:shadow-[0_0_15px_#00c3ff,0_0_25px_#00c3ff]">
        Losses
      </button>
    </div>

    <!-- Story List -->
    <div id="storyList" class="mt-5 text-left"></div>

    <!-- Home Button -->
    <div class="mt-8">
      <button onclick="goHome()" 
              class="font-[Orbitron] text-base px-5 py-2 rounded-md bg-[#ff006f] text-white cursor-pointer transition duration-300 hover:shadow-[0_0_15px_#ff006f,0_0_25px_#ff006f]">
        Home
      </button>
    </div>
  </div>

  <script>
    // Mock archive data (later from DB)
    let archive = [
      {
        id: 1,
        verdict: "WIN",
        story: [
          { player: "Player_1", text: "Once upon a time..." },
          { player: "AI_Buddy", text: "A ghost appeared and laughed..." }
        ]
      },
      {
        id: 2,
        verdict: "LOSE",
        story: [
          { player: "Player_2", text: "We went to Mars..." },
          { player: "AI_Buddy", text: "But forgot to bring oxygen." }
        ]
      }
    ];

    function renderStories(list) {
      const container = document.getElementById("storyList");
      container.innerHTML = "";

      list.forEach(item => {
        let div = document.createElement("div");
        div.className = `rounded-lg p-4 mb-4 border shadow-[0_0_8px] ${item.verdict === "WIN" 
                          ? "border-[#00ff9f] shadow-[#00ff9f]" 
                          : item.verdict === "LOSE" 
                            ? "border-[#ff003c] shadow-[#ff003c]" 
                            : "border-[#00c3ff] shadow-[#00c3ff]"} bg-white/5`;

        let header = document.createElement("div");
        header.className = "flex justify-between font-bold mb-2";
        header.innerHTML = `<span>Game #${item.id}</span> <span>${item.verdict}</span>`;

        let body = document.createElement("div");
        body.className = "text-sm max-h-[120px] overflow-y-auto";
        body.innerHTML = item.story.map(s => `<strong>${s.player}:</strong> ${s.text}`).join("<br>");

        div.appendChild(header);
        div.appendChild(body);
        container.appendChild(div);
      });
    }

    function filterStories(type) {
      if (type === "all") {
        renderStories(archive);
      } else {
        renderStories(archive.filter(s => s.verdict === type));
      }
    }

    function goHome() {
      window.location.href = "landing.html";
    }

    // Initial load
    renderStories(archive);
  </script>
</body>
</html>
