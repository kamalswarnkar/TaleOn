<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Archive - TaleOn</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="archive.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Story <span>Archive</span></h1>
        <p class="subtitle">Relive your wins, your losses... and your roasts.</p>

        <div class="filters">
            <button onclick="filterStories('all')">All</button>
            <button onclick="filterStories('WIN')">Wins</button>
            <button onclick="filterStories('LOSE')">Losses</button>
        </div>

        <div id="storyList" class="story-list"></div>

        <div class="buttons">
            <button onclick="goHome()">Home</button>
        </div>
    </div>

    <script src="archive.js"></script>
</body>
</html>
